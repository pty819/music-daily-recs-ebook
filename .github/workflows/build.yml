name: Build Sphinx Ebook

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Create virtual environment
        run: uv venv .venv --python 3.11

      - name: Install Sphinx and dependencies
        run: |
          uv pip install --python .venv sphinx sphinxcontrib-mermaid sphinx_rtd_theme

      - name: Build HTML ebook
        run: |
          uv run --python .venv sphinx-build -b html . _build/html

      - name: Build PDF (optional, if latex is available)
        run: |
          uv run --python .venv sphinx-build -b latex . _build/latex || true

      - name: Verify output
        run: |
          echo "=== Built files ===" && find _build/html -name "*.html" | head -20
          echo "=== Mermaid usage check ===" && grep -r "mermaid" _build/html/*.html | wc -l

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
